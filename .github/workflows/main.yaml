name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Fmt
        run: zig fmt --check .

      - name: Test
        run: zig build test --summary all

      - name: Build
        run: zig build

      - name: Install tree
        run: sudo apt-get install -y tree

      - name: Interop test
        run: ./scripts/interop.py tree ./zig-out/bin/bo
