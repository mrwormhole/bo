name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Fmt
        run: zig fmt --check .

      - name: Test
        run: zig build test --summary all

      - name: Build
        run: ./matrix-build.sh

      - name: Install tree
        env:
          TREE_VERSION: 2.3.2
        run: |
          set -eux
          curl -sSL "https://github.com/Old-Man-Programmer/tree/archive/refs/tags/${TREE_VERSION}.tar.gz" -o tree.tgz
          tar xzf tree.tgz
          make -C "tree-${TREE_VERSION}"
          sudo install -m 0755 "tree-${TREE_VERSION}/tree" /usr/local/bin/tree
          tree --version

      - name: Interop test
        run: |
          zig build && ./scripts/interop.py tree ./zig-out/bin/bo
